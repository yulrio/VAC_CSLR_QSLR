batch_size: 1
config: ./configs/baseline.yaml
dataset: QSLR2024
dataset_info:
  dataset_root: ./dataset/QSLR2024
  dict_path: ./preprocess/QSLR2024/gloss_dict.npy
  evaluation_dir: ./evaluation/slr_eval
  evaluation_prefix: QSLR2024-groundtruth
decode_mode: beam
device: '0'
eval_interval: 1
evaluate_tool: sclite
feeder: dataset.dataloader_video.BaseFeeder
feeder_args:
  datatype: video
  drop_ratio: 1.0
  mode: train
  num_gloss: -1
ignore_weights: []
load_checkpoints: null
load_weights: null
log_interval: 50
loss_weights:
  SeqCTC: 1.0
model: slr_network.SLRModel
model_args:
  c2d_type: resnet18
  conv_type: 2
  num_classes: 1296
  share_classifier: false
  use_bn: 1
  weight_norm: false
num_epoch: 30
num_worker: 4
optimizer_args:
  base_lr: 0.0001
  learning_ratio: 1
  nesterov: false
  optimizer: Adam
  start_epoch: 0
  step:
  - 20
  - 35
  weight_decay: 0.0001
phase: train
print_log: true
random_fix: true
random_seed: 0
save_interval: 5
test_batch_size: 2
work_dir: ./work_dir/baseline_res18/
